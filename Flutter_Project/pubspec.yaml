name: subtitle_blocker_flutter_refactor
description: Cross-platform Flutter rebuild shell for the legacy Android subtitle blocker app.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.9.0 <4.0.0'
  flutter: '>=3.35.0'

dependencies:
  cupertino_icons: ^1.0.8
  dio: ^5.9.2
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^3.3.1
  freezed_annotation: ^3.1.0
  get_it: ^9.2.1
  go_router: ^17.2.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  injectable: ^2.7.1+4
  intl: ^0.20.2
  json_annotation: ^4.11.0
  package_info_plus: ^9.0.1
  path_provider: ^2.1.5
  permission_handler: ^12.0.1
  retrofit: ^4.9.2
  riverpod_annotation: ^4.0.2
  share_plus: ^12.0.2
  url_launcher: ^6.3.2

dev_dependencies:
  build_runner: ^2.13.1
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  freezed: ^3.2.5
  hive_generator: ^2.0.1
  injectable_generator: ^2.12.1
  json_serializable: ^6.13.1
  pigeon: ^26.3.3
  retrofit_generator: ^10.2.4
  riverpod_generator: ^4.0.3

flutter:
  uses-material-design: true
  generate: true
